stages:
  - lint
  - test
  - build

variables:
  NODE_VERSION: "20"

default:
  image: node:${NODE_VERSION}
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

include:
  - template: Security/SAST.gitlab-ci.yml

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint

unit_test:
  stage: test
  script:
    - npm ci
    - npm run test

build:
  stage: build
  script:
    - npm ci
    - npm run build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Optional — enable when Playwright is set up
# e2e:
#   stage: test
#   script:
#     - npm ci
#     - npx playwright install --with-deps
#     - npm run test:e2e
#   allow_failure: true
